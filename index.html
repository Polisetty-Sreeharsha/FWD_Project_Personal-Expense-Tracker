<!DOCTYPE html>
<html>
<head>
    <title>Personal Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loginSection" class="card">
    <h2>Tracker Login</h2>
    <label>Username</label>
    <input type="text" id="user" placeholder="Enter name (e.g. Rahul)">
    <label>Password</label>
    <input type="password" id="pass" placeholder="Enter password">
    <button onclick="handleLogin()">Login</button>
</div>

<div id="trackerSection" style="display: none;">
    
<button onclick="goBack()" style="width: auto; background: #6c757d; padding: 8px 15px; margin-bottom: 15px; font-size: 12px;">
← Logout / Switch User
</button>

<div class="dashboard-grid">
<div class="stat-card stat-income">
<h4>Income</h4>
<h3 id="dashIncome">₹0.00</h3>
</div>

<div class="stat-card stat-expense">
<h4>Expense</h4>
<h3 id="dashExpense">₹0.00</h3>
</div>

<div class="stat-card stat-balance">
<h4>Balance</h4>
<h3 id="dashBalance">₹0.00</h3>
</div>
</div>

<div class="card" style="width: 540px;">
<h2>Add Transaction</h2>

<form id="transactionForm">

<label>Description</label>
<input type="text" id="desc" required>

<label>Amount (₹)</label>
<input type="number" step="0.01" id="amount" required>

<label>Date</label>
<input type="date" id="date" required>

<label>Type</label>
<select id="type">
<option value="Income">Income (+)</option>
<option value="Expense">Expense (-)</option>
</select>

<button type="submit">Save Transaction</button>

</form>
</div>

<div class="card" style="width: 540px;">
<h2>Recent History</h2>

<table>
<thead>
<tr>
<th>Description</th>
<th>Type</th>
<th>Amount</th>
<th>Date</th>
<th>Delete</th>
</tr>
</thead>

<tbody id="historyBody"></tbody>

</table>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
